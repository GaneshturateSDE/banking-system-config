spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  config:
    import:
      - optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/auth-service
  data:
    redis:
      host: localhost:6379

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name : RequestRateLimiter
              args:
                radis-rate-limiter.replenishRate: 5
                radis-rate-limiter.burstCapacity: 10
          routes:
            - id: account-service
              uri : lb://ACCOUNT-SERVICE
              predicates:
                - path=/api/account/**
              filters:
                - stripPrefix=1
            - id: transaction-service
              uri: lb://TRANSACTION-SERVICE
              predicates:
                - path=/api/transaction/**
              filters:
                - stripPrefix=1
                - name: cicuitBreaker
                  args :
                    name : transactionCB

server:
  port: 8081

eureka:
  client:
    service-url:
      defailtzone: http://localhost:8761/

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - promethus